<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>❤️ 表白心意 | 一份特别的礼物给你 ❤️</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none; /* 避免拖动图片/文字，不影响体验 */
        }

        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #ff9a9e 0%, #fad0c4 50%, #fad0c4 100%);
            font-family: 'Segoe UI', 'Quicksand', system-ui, -apple-system, 'Poppins', 'Dancing Script', cursive;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1.5rem;
            position: relative;
            overflow-x: hidden;
            cursor: pointer;
        }

        /* 飘浮的心形背景动画 */
        .floating-hearts {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
            overflow: hidden;
        }

        .heart-bg {
            position: absolute;
            font-size: 1.8rem;
            opacity: 0.15;
            animation: floatHeart 12s infinite ease-in-out;
            user-select: none;
            color: #ff3366;
        }

        @keyframes floatHeart {
            0% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 0;
            }
            20% {
                opacity: 0.25;
            }
            80% {
                opacity: 0.25;
            }
            100% {
                transform: translateY(-20vh) rotate(25deg);
                opacity: 0;
            }
        }

        /* 主卡片 */
        .card {
            position: relative;
            z-index: 20;
            max-width: 650px;
            width: 100%;
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(4px);
            border-radius: 55px 45px 65px 50px;
            box-shadow: 0 30px 45px rgba(0, 0, 0, 0.2), 0 0 0 1px rgba(255, 255, 255, 0.5) inset;
            overflow: hidden;
            transition: all 0.3s ease;
            animation: cardGlow 2s infinite alternate;
        }

        @keyframes cardGlow {
            0% {
                box-shadow: 0 30px 45px rgba(0, 0, 0, 0.2), 0 0 0 1px rgba(255, 215, 215, 0.6) inset;
            }
            100% {
                box-shadow: 0 35px 55px rgba(231, 76, 110, 0.3), 0 0 0 3px rgba(255, 160, 180, 0.7) inset;
            }
        }

        /* 顶部装饰 */
        .love-header {
            background: linear-gradient(135deg, #ff758c 0%, #ff7eb3 100%);
            padding: 2rem 1.5rem 1.8rem;
            text-align: center;
            color: white;
            clip-path: polygon(0 0, 100% 0, 100% 85%, 0 100%);
        }

        .love-header h1 {
            font-size: 2.5rem;
            letter-spacing: 2px;
            font-family: 'Dancing Script', cursive;
            text-shadow: 3px 3px 0 #c0395b;
            word-break: keep-all;
        }

        .love-header p {
            font-size: 1rem;
            margin-top: 8px;
            opacity: 0.9;
            font-style: italic;
        }

        /* 内容区域 */
        .content {
            padding: 2rem 2rem 1.8rem;
            text-align: center;
        }

        .message-box {
            background: rgba(255, 248, 245, 0.8);
            border-radius: 40px;
            padding: 1.2rem 1.5rem;
            margin-bottom: 2rem;
            border: 1px solid #ffb7c5;
            box-shadow: 0 8px 18px rgba(241, 147, 147, 0.2);
            transition: all 0.2s;
        }

        .message-text {
            font-size: 1.3rem;
            line-height: 1.5;
            font-weight: 500;
            color: #5d2a3c;
            font-family: 'Segoe UI', 'Quicksand', cursive;
        }

        .signature {
            text-align: right;
            margin-top: 15px;
            font-family: 'Dancing Script', cursive;
            font-size: 1.2rem;
            color: #c44569;
            font-weight: bold;
        }

        /* 动态按钮区域 */
        .action-area {
            display: flex;
            justify-content: center;
            gap: 2rem;
            flex-wrap: wrap;
            margin-top: 0.5rem;
            margin-bottom: 1.8rem;
        }

        .btn {
            border: none;
            background: #ffe6ed;
            padding: 0.9rem 2rem;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            transition: 0.2s;
            font-family: inherit;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-yes {
            background: #ff6b81;
            color: white;
            border: 2px solid #fff0f3;
            box-shadow: 0 8px 18px #ff4d6d70;
        }

        .btn-yes:hover {
            background: #e84357;
            transform: scale(1.05);
            box-shadow: 0 12px 20px #ff2e5b80;
        }

        .btn-no {
            background: #f8d7da;
            color: #a53146;
            border: 1px solid #ffb3c1;
            position: relative;
            transition: 0.1s linear;
        }

        /* 结果弹层样式 */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            visibility: hidden;
            opacity: 0;
            transition: all 0.25s ease;
        }

        .modal-overlay.active {
            visibility: visible;
            opacity: 1;
        }

        .modal-card {
            background: #fff5f7;
            max-width: 420px;
            width: 85%;
            border-radius: 70px 40px 70px 40px;
            text-align: center;
            padding: 2rem 1.5rem 2rem;
            box-shadow: 0 40px 60px rgba(0, 0, 0, 0.3);
            animation: bouncePop 0.4s cubic-bezier(0.34, 1.2, 0.64, 1);
            border: 1px solid #ffb7c2;
        }

        @keyframes bouncePop {
            0% {
                transform: scale(0.7);
                opacity: 0;
            }
            80% {
                transform: scale(1.02);
            }
            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        .modal-card h2 {
            font-size: 2rem;
            color: #c44569;
            margin-bottom: 20px;
            font-family: 'Dancing Script', cursive;
        }

        .modal-card p {
            font-size: 1.2rem;
            margin-bottom: 30px;
            color: #5e3a44;
        }

        .close-modal {
            background: #ff7e9e;
            border: none;
            padding: 12px 28px;
            border-radius: 40px;
            color: white;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.2s;
        }

        .close-modal:hover {
            background: #e8435c;
            transform: scale(0.96);
        }

        /* 彩蛋小爱心 */
        .sparkle-heart {
            position: fixed;
            font-size: 1.6rem;
            pointer-events: none;
            z-index: 999;
            animation: sparkleFly 1s ease-out forwards;
        }

        @keyframes sparkleFly {
            0% {
                transform: translateY(0) scale(0.5);
                opacity: 1;
            }
            100% {
                transform: translateY(-100px) scale(1.5);
                opacity: 0;
            }
        }

        /* 响应式 */
        @media (max-width: 550px) {
            .card {
                margin: 1rem;
            }
            .message-text {
                font-size: 1rem;
            }
            .btn {
                padding: 0.7rem 1.4rem;
                font-size: 1rem;
            }
            .love-header h1 {
                font-size: 1.8rem;
            }
        }
    </style>
</head>
<body>

<div class="floating-hearts" id="floatingHearts"></div>

<div class="card">
    <div class="love-header">
        <h1>✨ 致 我 的 星 星 ✨</h1>
        <p>有些话，藏在心里很久了 ···</p>
    </div>
    <div class="content">
        <div class="message-box">
            <div class="message-text">
                🌸 第一次遇见你，世界忽然有了颜色。<br>
                你就像落入我宇宙的星光，让我每一个明天都充满期待。<br>
                想和你一起看遍春夏秋冬，分享所有温柔与欢喜。<br>
                💖 <strong>你，愿意和我在一起吗？</strong> 💖
            </div>
            <div class="signature">
                —— 满眼都是你的某人
            </div>
        </div>
        <div class="action-area">
            <button class="btn btn-yes" id="yesBtn">❤️ 我愿意 ❤️</button>
            <button class="btn btn-no" id="noBtn">😢 再想想看</button>
        </div>
        <div style="font-size: 0.75rem; opacity: 0.6; margin-top: 6px;">点击爱心有惊喜哦~</div>
    </div>
</div>

<!-- 弹窗模态框 -->
<div class="modal-overlay" id="responseModal">
    <div class="modal-card">
        <h2 id="modalTitle">❤️ 耶！❤️</h2>
        <p id="modalMessage">我就知道你也喜欢我！从今以后，一起甜蜜暴击吧～</p>
        <button class="close-modal" id="closeModalBtn">💘 紧紧抱住 💘</button>
    </div>
</div>

<script>
    (function() {
        // ---------- 动态生成背景漂浮爱心 ----------
        const heartsContainer = document.getElementById('floatingHearts');
        const heartSymbols = ['❤️', '💖', '💗', '💓', '💕', '💞', '🌸', '🌹', '✨'];

        function createFloatingHeart() {
            const heart = document.createElement('div');
            heart.classList.add('heart-bg');
            const randSymbol = heartSymbols[Math.floor(Math.random() * heartSymbols.length)];
            heart.innerHTML = randSymbol;
            const size = Math.random() * 30 + 20; // 20px - 50px
            heart.style.fontSize = size + 'px';
            heart.style.left = Math.random() * 100 + '%';
            heart.style.animationDuration = Math.random() * 8 + 8 + 's'; // 8~16s
            heart.style.animationDelay = Math.random() * 10 + 's';
            heart.style.opacity = Math.random() * 0.25 + 0.1;
            heartsContainer.appendChild(heart);

            // 动画结束后移除元素，避免dom过多
            heart.addEventListener('animationend', () => {
                heart.remove();
            });
        }

        // 生成30个背景爱心
        for (let i = 0; i < 35; i++) {
            setTimeout(() => createFloatingHeart(), i * 300);
        }
        // 定时持续补充背景爱心
        setInterval(() => {
            if (heartsContainer.children.length < 70) createFloatingHeart();
        }, 3000);

        // ---------- 按钮 + 炫酷特效 ----------
        const yesBtn = document.getElementById('yesBtn');
        const noBtn = document.getElementById('noBtn');
        const modal = document.getElementById('responseModal');
        const modalTitle = document.getElementById('modalTitle');
        const modalMessage = document.getElementById('modalMessage');
        const closeModalBtn = document.getElementById('closeModalBtn');

        // 产生飘浮小爱心特效 (点击任何地方或按钮也可以触发)
        function createSparkleHeart(x, y) {
            const sparkle = document.createElement('div');
            sparkle.classList.add('sparkle-heart');
            const heartIcons = ['❤️', '💖', '💗', '💘', '💝', '💟'];
            sparkle.innerHTML = heartIcons[Math.floor(Math.random() * heartIcons.length)];
            sparkle.style.left = (x - 12) + 'px';
            sparkle.style.top = (y - 12) + 'px';
            sparkle.style.position = 'fixed';
            document.body.appendChild(sparkle);
            setTimeout(() => {
                if (sparkle && sparkle.remove) sparkle.remove();
            }, 1000);
        }

        // 批量爱心雨特效 (响应表白成功)
        function burstHearts(fromEvent = false, centerX = null, centerY = null) {
            let baseX, baseY;
            if (fromEvent && centerX && centerY) {
                baseX = centerX;
                baseY = centerY;
            } else {
                // 从屏幕中央爆发
                baseX = window.innerWidth / 2;
                baseY = window.innerHeight / 2;
            }
            for (let i = 0; i < 38; i++) {
                setTimeout(() => {
                    const randX = baseX + (Math.random() - 0.5) * 180;
                    const randY = baseY + (Math.random() - 0.5) * 150;
                    const heartDiv = document.createElement('div');
                    heartDiv.classList.add('sparkle-heart');
                    heartDiv.innerHTML = ['❤️', '💖', '💗', '💓', '💘', '💕', '💞'][Math.floor(Math.random() * 7)];
                    heartDiv.style.left = randX + 'px';
                    heartDiv.style.top = randY + 'px';
                    heartDiv.style.fontSize = (Math.random() * 20 + 18) + 'px';
                    document.body.appendChild(heartDiv);
                    setTimeout(() => heartDiv.remove(), 1200);
                }, i * 35);
            }
        }

        // 显示弹窗且附带爱心特效
        function showModal(isYes) {
            if (isYes) {
                modalTitle.innerHTML = '💌 答 应 你
