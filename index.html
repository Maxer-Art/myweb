<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>❤️ 告白心意｜一份甜甜的礼物 ❤️</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #ff9a9e 0%, #fad0c4 50%, #ffdde1 100%);
            font-family: 'Segoe UI', 'Quicksand', system-ui, -apple-system, 'Poppins', 'Dancing Script', cursive;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1.5rem;
            position: relative;
            overflow-x: hidden;
        }

        /* 浪漫漂浮背景 */
        .floating-hearts {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .heart-bg {
            position: absolute;
            font-size: 1.8rem;
            opacity: 0.2;
            animation: floatHeart 12s infinite ease-in-out;
            color: #ff3366;
        }

        @keyframes floatHeart {
            0% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 0;
            }
            20% {
                opacity: 0.25;
            }
            80% {
                opacity: 0.2;
            }
            100% {
                transform: translateY(-20vh) rotate(20deg);
                opacity: 0;
            }
        }

        /* 主卡片 */
        .card {
            position: relative;
            z-index: 20;
            max-width: 650px;
            width: 100%;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(6px);
            border-radius: 60px 50px 70px 50px;
            box-shadow: 0 30px 45px rgba(0, 0, 0, 0.2);
            transition: all 0.3s ease;
        }

        .love-header {
            background: linear-gradient(135deg, #ff6a88 0%, #ff8a9f 100%);
            padding: 2rem 1.5rem 1.8rem;
            text-align: center;
            color: white;
            border-radius: 60px 50px 0 0;
        }

        .love-header h1 {
            font-size: 2.5rem;
            font-family: 'Dancing Script', cursive;
            text-shadow: 2px 2px 0 #b93b54;
        }

        .love-header p {
            font-size: 1rem;
            margin-top: 8px;
            opacity: 0.9;
            font-style: italic;
        }

        .content {
            padding: 2rem 2rem 1.8rem;
            text-align: center;
        }

        .message-box {
            background: rgba(255, 248, 245, 0.9);
            border-radius: 45px;
            padding: 1.5rem;
            margin-bottom: 2rem;
            border: 1px solid #ffb7c5;
        }

        .message-text {
            font-size: 1.25rem;
            line-height: 1.5;
            font-weight: 500;
            color: #5d2a3c;
        }

        .signature {
            text-align: right;
            margin-top: 15px;
            font-family: 'Dancing Script', cursive;
            font-size: 1.2rem;
            color: #c44569;
            font-weight: bold;
        }

        .action-area {
            display: flex;
            justify-content: center;
            gap: 2rem;
            flex-wrap: wrap;
            margin: 1rem 0 1rem;
        }

        .btn {
            border: none;
            background: #ffe6ed;
            padding: 0.9rem 2rem;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: inherit;
            box-shadow: 0 5px 12px rgba(0, 0, 0, 0.1);
        }

        .btn-yes {
            background: #ff6b81;
            color: white;
        }

        .btn-yes:hover {
            background: #e84357;
            transform: scale(1.05);
        }

        .btn-no {
            background: #ffe0e4;
            color: #ac3f58;
            border: 1px solid #ffb7c5;
        }

        .btn-no:hover {
            background: #ffd0d8;
        }

        /* 弹窗 */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            visibility: hidden;
            opacity: 0;
            transition: all 0.25s ease;
        }

        .modal-overlay.active {
            visibility: visible;
            opacity: 1;
        }

        .modal-card {
            background: #fff5f8;
            max-width: 420px;
            width: 85%;
            border-radius: 70px 40px 70px 40px;
            text-align: center;
            padding: 2rem 1.5rem;
            box-shadow: 0 40px 60px rgba(0, 0, 0, 0.3);
            border: 1px solid #ffb7c2;
        }

        .modal-card h2 {
            font-size: 2rem;
            color: #c44569;
            margin-bottom: 20px;
            font-family: 'Dancing Script', cursive;
        }

        .modal-card p {
            font-size: 1.2rem;
            margin-bottom: 30px;
            color: #5e3a44;
        }

        .close-modal {
            background: #ff7e9e;
            border: none;
            padding: 12px 28px;
            border-radius: 40px;
            color: white;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.2s;
        }

        .close-modal:hover {
            background: #e8435c;
        }

        .sparkle-heart {
            position: fixed;
            font-size: 1.6rem;
            pointer-events: none;
            z-index: 999;
            animation: sparkleFly 1s ease-out forwards;
        }

        @keyframes sparkleFly {
            0% {
                transform: translateY(0) scale(0.3);
                opacity: 1;
            }
            100% {
                transform: translateY(-90px) scale(1.2);
                opacity: 0;
            }
        }

        @media (max-width: 550px) {
            .message-text {
                font-size: 1rem;
            }
            .btn {
                padding: 0.7rem 1.4rem;
                font-size: 1rem;
            }
            .love-header h1 {
                font-size: 1.8rem;
            }
        }
    </style>
</head>
<body>

<div class="floating-hearts" id="floatingHearts"></div>

<div class="card">
    <div class="love-header">
        <h1>✨ 致 我 的 星 星 ✨</h1>
        <p>有些话，藏在心里很久了~</p>
    </div>
    <div class="content">
        <div class="message-box">
            <div class="message-text">
                🌸 第一次遇见你，世界忽然有了颜色。<br>
                你就像落入我宇宙的星光，让我每一个明天都充满期待。<br>
                想和你一起看遍春夏秋冬，分享所有温柔与欢喜。<br>
                💖 <strong>你，愿意和我在一起吗？</strong> 💖
            </div>
            <div class="signature">
                —— 满眼都是你的某人
            </div>
        </div>
        <div class="action-area">
            <button class="btn btn-yes" id="yesBtn">❤️ 我同意 ❤️</button>
            <button class="btn btn-no" id="noBtn">🌸 再想想看</button>
        </div>
        <div style="font-size: 0.7rem; opacity: 0.6; margin-top: 8px;">✨ 点击爱心有惊喜哦~ ✨</div>
    </div>
</div>

<div class="modal-overlay" id="responseModal">
    <div class="modal-card">
        <h2 id="modalTitle">🎉 太好啦！🎉</h2>
        <p id="modalMessage">我就知道你也喜欢我！未来的每一天，一起甜甜蜜蜜吧～ 💑</p>
        <button class="close-modal" id="closeModalBtn">💕 紧紧抱住 💕</button>
    </div>
</div>

<script>
    // 等待页面完全加载后再绑定事件，确保万无一失
    window.addEventListener('DOMContentLoaded', function() {
        console.log('页面已加载，开始绑定事件');

        // 1. 背景爱心生成
        const heartsContainer = document.getElementById('floatingHearts');
        const heartIconsBg = ['❤️', '💖', '💗', '💓', '💕', '🌸', '🌹'];

        function addBgHeart() {
            const heart = document.createElement('div');
            heart.classList.add('heart-bg');
            heart.innerHTML = heartIconsBg[Math.floor(Math.random() * heartIconsBg.length)];
            const size = Math.random() * 28 + 18;
            heart.style.fontSize = size + 'px';
            heart.style.left = Math.random() * 100 + '%';
            heart.style.animationDuration = Math.random() * 10 + 8 + 's';
            heart.style.animationDelay = Math.random() * 8 + 's';
            heartsContainer.appendChild(heart);
            heart.addEventListener('animationend', function() { heart.remove(); });
        }
        
        for (let i = 0; i < 25; i++) {
            setTimeout(addBgHeart, i * 200);
        }
        setInterval(function() { 
            if (heartsContainer.children.length < 50) addBgHeart(); 
        }, 3000);

        // 2. 爱心特效函数
        function createSparkleHeart(x, y) {
            const spark = document.createElement('div');
            spark.classList.add('sparkle-heart');
            const loveSet = ['❤️', '💖', '💗', '💘', '💝', '✨'];
            spark.innerHTML = loveSet[Math.floor(Math.random() * loveSet.length)];
            spark.style.left = (x - 12) + 'px';
            spark.style.top = (y - 12) + 'px';
            document.body.appendChild(spark);
            setTimeout(function() { if(spark && spark.remove) spark.remove(); }, 1000);
        }

        function burstLove() {
            const baseX = window.innerWidth / 2;
            const baseY = window.innerHeight / 2;
            for (let i = 0; i < 45; i++) {
                setTimeout(function() {
                    const offsetX = (Math.random() - 0.5) * 200;
                    const offsetY = (Math.random() - 0.5) * 150;
                    const heartDiv = document.createElement('div');
                    heartDiv.classList.add('sparkle-heart');
                    heartDiv.innerHTML = ['❤️', '💖', '💗', '💓', '💘', '💕'][Math.floor(Math.random() * 6)];
                    heartDiv.style.left = (baseX + offsetX) + 'px';
                    heartDiv.style.top = (baseY + offsetY) + 'px';
                    heartDiv.style.fontSize = (Math.random() * 20 + 18) + 'px';
                    document.body.appendChild(heartDiv);
                    setTimeout(function() { if(heartDiv && heartDiv.remove) heartDiv.remove(); }, 1300);
                }, i * 30);
            }
        }

        // 3. 获取元素
        const yesBtn = document.getElementById('yesBtn');
        const noBtn = document.getElementById('noBtn');
        const modal = document.getElementById('responseModal');
        const modalTitle = document.getElementById('modalTitle');
        const modalMessage = document.getElementById('modalMessage');
        const closeModalBtn = document.getElementById('closeModalBtn');

        // 4. 弹窗控制
        function openModal(isPositive) {
            if (isPositive) {
                modalTitle.innerHTML = '💖 我 们 在 一 起 吧 💖';
                modalMessage.innerHTML = '你的心意我收到啦！从今往后，每一个朝暮都有我陪你，永远爱你哟 ❤️ 让我们开启甜蜜旅程！';
                burstLove();
                setTimeout(function() { burstLove(); }, 400);
            } else {
                modalTitle.innerHTML = '🌸 等 你 的 那 一 天 🌸';
                modalMessage.innerHTML = '没关系的，我愿意耐心等待。因为是你，所以值得。我会一直在这里，等你回过头看看我～ 🌹';
                for (let i = 0; i < 20; i++) {
                    setTimeout(function() {
                        const fakeX = window.innerWidth / 2 + (Math.random() - 0.5) * 250;
                        const fakeY = window.innerHeight - 40;
                        createSparkleHeart(fakeX, fakeY);
                    }, i * 50);
                }
            }
            modal.classList.add('active');
        }

        function closeModal() {
            modal.classList.remove('active');
        }

        // 5. ✅ 我同意按钮 - 确保点击有反应
        if (yesBtn) {
            yesBtn.addEventListener('click', function(e) {
                e.stopPropagation();
                console.log('我同意按钮被点击了！');
                const x = e.clientX || window.innerWidth / 2;
                const y = e.clientY || window.innerHeight / 2;
                for (let i = 0; i < 10; i++) {
                    setTimeout(function() {
                        createSparkleHeart(x + (Math.random() - 0.5) * 60, y + (Math.random() - 0.5) * 50);
                    }, i * 25);
                }
                openModal(true);
            });
        } else {
            console.error('找不到yesBtn元素');
        }

        // 6. 🌸 再想想看按钮 - 温柔回应，保证有反馈
        let missCount = 0;
        const noOriginalText = noBtn.innerHTML;

        function resetNoBtn() {
            noBtn.innerHTML = noOriginalText;
            noBtn.style.transform = 'translate(0, 0)';
            noBtn.disabled = false;
        }

        if (noBtn) {
            noBtn.addEventListener('click', function(e) {
                e.stopPropagation();
                console.log('再想想看按钮被点击了！missCount:', missCount);
                
                const rect = noBtn.getBoundingClientRect();
                const heartX = rect.left + rect.width / 2;
                const heartY = rect.top + rect.height / 2;
                for (let i = 0; i < 6; i++) {
                    setTimeout(function() {
                        createSparkleHeart(heartX + (Math.random() - 0.5) * 40, heartY + (Math.random() - 0.5) * 30);
                    }, i * 30);
                }

                if (missCount < 3) {
                    // 前3次轻微撒娇移动
                    const shiftX = (Math.random() - 0.5) * 20;
                    const shiftY = (Math.random() - 0.5) * 15;
                    noBtn.style.transform = 'translate(' + shiftX + 'px, ' + shiftY + 'px)';
                    noBtn.style.transition = '0.1s linear';
                    setTimeout(function() {
                        if (noBtn) noBtn.style.transform = 'translate(0px, 0px)';
                    }, 180);
                    
                    const cuteTexts = ["🥺 再想想嘛", "💗 我真的超认真", "✨ 我超喜欢你", "🌹 给我个机会吧"];
                    noBtn.innerHTML = cuteTexts[missCount % cuteTexts.length];
                    missCount++;
                    
                    if (missCount === 3) {
                        setTimeout(function() {
                            if (noBtn) {
                                noBtn.innerHTML = noOriginalText;
                                noBtn.style.transform = 'translate(0,0)';
                            }
                        }, 500);
                    }
                } else {
                    // 第4次及以后直接打开温柔弹窗
                    openModal(false);
                    resetNoBtn();
                    missCount = 0;
                }
            });
        } else {
            console.error('找不到noBtn元素');
        }

        // 关闭弹窗
        if (closeModalBtn) {
            closeModalBtn.addEventListener('click', closeModal);
        }
        if (modal) {
            modal.addEventListener('click', function(e) { 
                if (e.target === modal) closeModal(); 
            });
        }

        // 7. 页面任意点击小彩蛋
        document.body.addEventListener('click', function(e) {
            if (e.target === yesBtn || e.target === noBtn || e.target.closest('.btn')) return;
            if (e.clientX && e.clientY) {
                for (let i = 0; i < 2; i++) {
                    createSparkleHeart(e.clientX + (Math.random() - 0.5) * 20, e.clientY + (Math.random() - 0.5) * 20);
                }
            }
        });

        // 初始欢迎爱心
        setTimeout(function() {
            for (let i = 0; i < 18; i++) {
                setTimeout(function() {
                    const randX = Math.random() * window.innerWidth;
                    const randY = window.innerHeight * 0.2;
                    createSparkleHeart(randX, randY);
                }, i * 80);
            }
        }, 300);
        
        console.log('✅ 所有事件绑定完成，按钮现在应该可以正常点击了！');
    });
</script>
</body>
</html>
