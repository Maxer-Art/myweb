<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>❤️ 一封给你的告白信 ❤️</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none; /* 让点击体验更干净 */
        }

        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #ff9a9e 0%, #fad0c4 50%, #ffdde1 100%);
            font-family: 'Segoe UI', 'Quicksand', system-ui, -apple-system, 'Poppins', 'Dancing Script', cursive;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1.5rem;
            position: relative;
            overflow-x: hidden;
            cursor: pointer;
        }

        /* 浪漫漂浮背景 */
        .floating-hearts {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
            overflow: hidden;
        }

        .heart-bg {
            position: absolute;
            font-size: 1.8rem;
            opacity: 0.2;
            animation: floatHeart 14s infinite ease-in-out;
            color: #ff3366;
        }

        @keyframes floatHeart {
            0% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 0;
            }
            20% {
                opacity: 0.25;
            }
            80% {
                opacity: 0.2;
            }
            100% {
                transform: translateY(-20vh) rotate(20deg);
                opacity: 0;
            }
        }

        /* 主卡片 */
        .card {
            position: relative;
            z-index: 20;
            max-width: 650px;
            width: 100%;
            background: rgba(255, 255, 255, 0.94);
            backdrop-filter: blur(6px);
            border-radius: 60px 50px 70px 50px;
            box-shadow: 0 30px 45px rgba(0, 0, 0, 0.2), 0 0 0 1px rgba(255, 255, 255, 0.6) inset;
            transition: all 0.3s ease;
            animation: gentleGlow 2.5s infinite alternate;
        }

        @keyframes gentleGlow {
            0% {
                box-shadow: 0 30px 45px rgba(0, 0, 0, 0.15), 0 0 0 1px rgba(255, 215, 215, 0.7) inset;
            }
            100% {
                box-shadow: 0 35px 55px rgba(231, 76, 110, 0.3), 0 0 0 3px rgba(255, 180, 200, 0.8) inset;
            }
        }

        .love-header {
            background: linear-gradient(135deg, #ff6a88 0%, #ff8a9f 100%);
            padding: 2rem 1.5rem 1.8rem;
            text-align: center;
            color: white;
            clip-path: polygon(0 0, 100% 0, 100% 85%, 0 100%);
        }

        .love-header h1 {
            font-size: 2.5rem;
            font-family: 'Dancing Script', cursive;
            text-shadow: 2px 2px 0 #b93b54;
        }

        .love-header p {
            font-size: 1rem;
            margin-top: 8px;
            opacity: 0.9;
            font-style: italic;
        }

        .content {
            padding: 2rem 2rem 1.8rem;
            text-align: center;
        }

        .message-box {
            background: rgba(255, 248, 245, 0.9);
            border-radius: 45px;
            padding: 1.5rem;
            margin-bottom: 2rem;
            border: 1px solid #ffb7c5;
            box-shadow: 0 8px 18px rgba(241, 147, 147, 0.2);
        }

        .message-text {
            font-size: 1.25rem;
            line-height: 1.5;
            font-weight: 500;
            color: #5d2a3c;
        }

        .signature {
            text-align: right;
            margin-top: 15px;
            font-family: 'Dancing Script', cursive;
            font-size: 1.2rem;
            color: #c44569;
            font-weight: bold;
        }

        .action-area {
            display: flex;
            justify-content: center;
            gap: 2rem;
            flex-wrap: wrap;
            margin: 1rem 0 1rem;
        }

        .btn {
            border: none;
            background: #ffe6ed;
            padding: 0.9rem 2rem;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: inherit;
            box-shadow: 0 5px 12px rgba(0, 0, 0, 0.1);
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-yes {
            background: #ff6b81;
            color: white;
            border: none;
            box-shadow: 0 8px 18px #ff4d6d70;
        }

        .btn-yes:hover {
            background: #e84357;
            transform: scale(1.05);
        }

        .btn-no {
            background: #ffe0e4;
            color: #ac3f58;
            border: 1px solid #ffb7c5;
            position: relative;
        }

        .btn-no:hover {
            background: #ffd0d8;
            transform: scale(0.98);
        }

        /* 弹窗 */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            visibility: hidden;
            opacity: 0;
            transition: all 0.25s ease;
        }

        .modal-overlay.active {
            visibility: visible;
            opacity: 1;
        }

        .modal-card {
            background: #fff5f8;
            max-width: 420px;
            width: 85%;
            border-radius: 70px 40px 70px 40px;
            text-align: center;
            padding: 2rem 1.5rem;
            box-shadow: 0 40px 60px rgba(0, 0, 0, 0.3);
            animation: bouncePop 0.4s cubic-bezier(0.34, 1.2, 0.64, 1);
            border: 1px solid #ffb7c2;
        }

        @keyframes bouncePop {
            0% {
                transform: scale(0.7);
                opacity: 0;
            }
            80% {
                transform: scale(1.02);
            }
            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        .modal-card h2 {
            font-size: 2rem;
            color: #c44569;
            margin-bottom: 20px;
            font-family: 'Dancing Script', cursive;
        }

        .modal-card p {
            font-size: 1.2rem;
            margin-bottom: 30px;
            color: #5e3a44;
        }

        .close-modal {
            background: #ff7e9e;
            border: none;
            padding: 12px 28px;
            border-radius: 40px;
            color: white;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.2s;
        }

        .close-modal:hover {
            background: #e8435c;
        }

        /* 飘浮小爱心动画 */
        .sparkle-heart {
            position: fixed;
            font-size: 1.6rem;
            pointer-events: none;
            z-index: 999;
            animation: sparkleFly 1s ease-out forwards;
        }

        @keyframes sparkleFly {
            0% {
                transform: translateY(0) scale(0.3);
                opacity: 1;
            }
            100% {
                transform: translateY(-90px) scale(1.2);
                opacity: 0;
            }
        }

        @media (max-width: 550px) {
            .message-text {
                font-size: 1rem;
            }
            .btn {
                padding: 0.7rem 1.4rem;
                font-size: 1rem;
            }
            .love-header h1 {
                font-size: 1.8rem;
            }
        }
    </style>
</head>
<body>

<div class="floating-hearts" id="floatingHearts"></div>

<div class="card">
    <div class="love-header">
        <h1>💌 给 最 特 别 的 你 💌</h1>
        <p>✨ 遇见你，是我的幸运 ✨</p>
    </div>
    <div class="content">
        <div class="message-box">
            <div class="message-text">
                🌹 你的出现，让我的世界万物晴朗。<br>
                想和你一起分享所有的美好，也想在你难过时给你拥抱。<br>
                我想成为你身边那个一直陪伴的人。<br>
                💖 <strong>你愿意和我在一起吗？</strong> 💖
            </div>
            <div class="signature">
                —— 满眼都是你的某人
            </div>
        </div>
        <div class="action-area">
            <button class="btn btn-yes" id="yesBtn">❤️ 我愿意 ❤️</button>
            <button class="btn btn-no" id="noBtn">🌸 再想想看</button>
        </div>
        <div style="font-size: 0.7rem; opacity: 0.6; margin-top: 8px;">✨ 轻轻点击，有心动彩蛋 ✨</div>
    </div>
</div>

<!-- 弹窗结构 -->
<div class="modal-overlay" id="responseModal">
    <div class="modal-card">
        <h2 id="modalTitle">🎉 太棒啦！🎉</h2>
        <p id="modalMessage">我就知道你也喜欢我！未来的每一天，一起甜甜蜜蜜吧～ 💑</p>
        <button class="close-modal" id="closeModalBtn">💕 紧紧抱住 💕</button>
    </div>
</div>

<script>
    (function() {
        // 1. 浪漫背景爱心持续生成
        const heartsContainer = document.getElementById('floatingHearts');
        const heartIconsBg = ['❤️', '💖', '💗', '💓', '💕', '🌸', '🌹'];

        function addBgHeart() {
            const heart = document.createElement('div');
            heart.classList.add('heart-bg');
            heart.innerHTML = heartIconsBg[Math.floor(Math.random() * heartIconsBg.length)];
            const size = Math.random() * 28 + 18;
            heart.style.fontSize = size + 'px';
            heart.style.left = Math.random() * 100 + '%';
            heart.style.animationDuration = Math.random() * 10 + 8 + 's';
            heart.style.animationDelay = Math.random() * 8 + 's';
            heartsContainer.appendChild(heart);
            heart.addEventListener('animationend', () => heart.remove());
        }
        for (let i = 0; i < 30; i++) setTimeout(addBgHeart, i * 200);
        setInterval(() => { if (heartsContainer.children.length < 60) addBgHeart(); }, 2800);

        // 2. 核心交互元素
        const yesBtn = document.getElementById('yesBtn');
        const noBtn = document.getElementById('noBtn');
        const modal = document.getElementById('responseModal');
        const modalTitle = document.getElementById('modalTitle');
        const modalMessage = document.getElementById('modalMessage');
        const closeModalBtn = document.getElementById('closeModalBtn');

        // 3. 辅助特效函数: 产生小爱心雨
        function createSparkleHeart(x, y) {
            const spark = document.createElement('div');
            spark.classList.add('sparkle-heart');
            const loveSet = ['❤️', '💖', '💗', '💘', '💝', '✨'];
            spark.innerHTML = loveSet[Math.floor(Math.random() * loveSet.length)];
            spark.style.left = (x - 12) + 'px';
            spark.style.top = (y - 12) + 'px';
            document.body.appendChild(spark);
            setTimeout(() => spark.remove(), 1000);
        }

        function burstLove(fromCenter = true, customX = null, customY = null) {
            let baseX = window.innerWidth / 2;
            let baseY = window.innerHeight / 2;
            if (!fromCenter && customX && customY) {
                baseX = customX;
                baseY = customY;
            }
            for (let i = 0; i < 40; i++) {
                setTimeout(() => {
                    const offsetX = (Math.random() - 0.5) * 200;
                    const offsetY = (Math.random() - 0.5) * 150;
                    const heartDiv = document.createElement('div');
                    heartDiv.classList.add('sparkle-heart');
                    heartDiv.innerHTML = ['❤️', '💖', '💗', '💓', '💘', '💕'][Math.floor(Math.random() * 6)];
                    heartDiv.style.left = (baseX + offsetX) + 'px';
                    heartDiv.style.top = (baseY + offsetY) + 'px';
                    heartDiv.style.fontSize = (Math.random() * 20 + 18) + 'px';
                    document.body.appendChild(heartDiv);
                    setTimeout(() => heartDiv.remove(), 1300);
                }, i * 30);
            }
        }

        // 4. 弹窗控制
        function openModal(isPositive) {
            if (isPositive) {
                modalTitle.innerHTML = '💖 我 们 在 一 起 吧 💖';
                modalMessage.innerHTML = '你的心意我收到啦！从今往后，每一个朝暮都有我陪你，永远爱你哟 ❤️ 让我们开启甜蜜旅程！';
                burstLove(true);
                // 额外再来一波浪漫
                setTimeout(() => burstLove(true), 400);
            } else {
                modalTitle.innerHTML = '🌸 等 你 的 那 一 天 🌸';
                modalMessage.innerHTML = '没关系的，我愿意耐心等待。因为是你，所以值得。我会一直在这里，等你回过头看看我～ 🌹';
                // 温柔落心雨
                for (let i = 0; i < 20; i++) {
                    setTimeout(() => {
                        const fakeX = window.innerWidth / 2 + (Math.random() - 0.5) * 250;
                        const fakeY = window.innerHeight - 40;
                        createSparkleHeart(fakeX, fakeY);
                    }, i * 50);
                }
            }
            modal.classList.add('active');
        }

        function closeModal() {
            modal.classList.remove('active');
        }

        // 5. 愿意按钮（完美互动）
        yesBtn.addEventListener('click', (e) => {
            const x = e.clientX || window.innerWidth / 2;
            const y = e.clientY || window.innerHeight / 2;
            for (let i = 0; i < 10; i++) {
                setTimeout(() => createSparkleHeart(x + (Math.random() - 0.5) * 60, y + (Math.random() - 0.5) * 50), i * 25);
            }
            openModal(true);
        });

        // 6. 再想想看 —— 完美修复，确保每一次点击都有温柔反馈且不卡死
        let missCount = 0;
        const noOriginalText = noBtn.innerHTML;

        function resetNoBtn() {
            noBtn.innerHTML = noOriginalText;
            noBtn.style.transform = 'translate(0, 0)';
            noBtn.style.opacity = '1';
            noBtn.disabled = false;
        }

        noBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            // 每次点击都会产生小爱心
            const rect = noBtn.getBoundingClientRect();
            const heartX = rect.left + rect.width / 2;
            const heartY = rect.top + rect.height / 2;
            for (let i = 0; i < 6; i++) {
                setTimeout(() => createSparkleHeart(heartX + (Math.random() - 0.5) * 40, heartY + (Math.random() - 0.5) * 30), i * 30);
            }

            if (missCount < 4) {
                // 前4次温柔地「躲一下」但绝不破坏点击注册，只是轻微移动+文字撒娇
                const shiftX = (Math.random() - 0.5) * 25;
                const shiftY = (Math.random() - 0.5) * 20 - 5;
                noBtn.style.transform = `translate(${shiftX}px, ${shiftY}px)`;
                noBtn.style.transition = '0.1s linear';
                setTimeout(() => {
                    if (noBtn) noBtn.style.transform = 'translate(0px, 0px)';
                }, 180);
                // 更换可爱文字
                const cuteTexts = ["🥺 再想想嘛", "💗 我真的超认真", "✨ 你看爱心都同意了", "🌹 给我个机会吧", "💕 点我愿意嘛"];
                noBtn.innerHTML = cuteTexts[missCount % cuteTexts.length];
                missCount++;
                // 第4次之后恢复原本文字并且不再躲避，直接显示温柔弹窗
                if (missCount === 4) {
                    setTimeout(() => {
                        if (noBtn) {
                            noBtn.innerHTML = noOriginalText;
                            noBtn.style.transform = 'translate(0,0)';
                        }
                    }, 500);
                }
            } else {
                // 第五次开始直接打开等待弹窗，没有闪避，非常友善
                openModal(false);
                resetNoBtn();
                missCount = 0; // 重置计数器
            }
        });

        // 确保鼠标悬停时没有副作用，但为了体验，让按钮不抖动太过分
        noBtn.addEventListener('mouseenter', () => {
            if (missCount < 3) {
                noBtn.style.transform = 'scale(0.97)';
                setTimeout(() => { if (noBtn) noBtn.style.transform = ''; }, 150);
            }
        });
        noBtn.addEventListener('mouseleave', () => {
            noBtn.style.transform = '';
        });

        closeModalBtn.addEventListener('click', closeModal);
        modal.addEventListener('click', (e) => { if (e.target === modal) closeModal(); });

        // 7. 页面任意点击爱心飘落彩蛋
        document.body.addEventListener('click', (e) => {
            if (e.target === yesBtn || e.target === noBtn || e.target.closest('.btn')) return;
            if (e.clientX && e.clientY) {
                for (let i = 0; i < 2; i++) {
                    createSparkleHeart(e.clientX + (Math.random() - 0.5) * 20, e.clientY + (Math.random() - 0.5) * 20);
                }
            }
        });

        // 打开页面欢迎效果
        setTimeout(() => {
            for (let i = 0; i < 20; i++) {
                setTimeout(() => {
                    const randX = Math.random() * window.innerWidth;
                    const randY = window.innerHeight * 0.2;
                    createSparkleHeart(randX, randY);
                }, i * 80);
            }
        }, 300);
        console.log("%c❤️ 表白网站已加载，愿你勇敢表白成功！❤️", "color: #ff4d6d; font-size: 16px");
    })();
</script>
</body>
</html>
